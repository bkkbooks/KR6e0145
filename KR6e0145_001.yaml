body:
  text: 清浙水慈雲沙門續法集門人法賢較森羅萬象至空而極百川眾派至海而極一切聖賢至佛而極一切教法至圓而極如來說經華嚴而極古德判釋賢首而極故今依彼教觀開合五門百法若非大經蓮花無由取喻開悟初辨時日出花初開影臨高水色香始布人蜂畢集先照時也一日昇隨風開合不定若食時辰也色略淡香漸微影近低水名為初轉若亭午遠望白近看紅影落深水名為中轉若晡時申也色稍濃香少重影近高水名為後轉總成轉照時也二日沒花將合影還高水色香如初人蜂復集還照時也三別時如此通時云何於一念間色香光影無不具足與餘無異名唯一念一香氣色光於三時中一一遍周隨心應量名盡一化二今日三時開合既爾前昨也日後明也日三時亦然名遍三際三前日先照還照香光與今日後日先照還照同名攝同劫四後日中轉香影光色與前日今日初轉後轉同名收異劫五一念花果不異前後日月歲時前後日月歲時花果不異今念名念攝劫六一念所攝前後時中復有多念彼多念中復攝多時名復重收七此池既爾彼池亦然東土既爾西域亦然名異界時八彼此東西所有劫念互相攝入重重無盡名彼此攝九即念即劫非念非劫以時無體依花上立花既融通時亦無礙名本收末十次敘儀原種花為本分移花為末名色體同上中下別名本末差別一從一本種生開多花名依本起末二雖多支派不離原種名攝末歸本三非本種無以有眷屬隨生非眷屬無以顯根本原種名本末無礙四蓮開九品色分四種循業發現寧有方所名隨機不定五互相見聞者名顯不相見聞者名密同一花上而成顯密名顯密同時六瓣鬚房實同時具足名一時頓演七柔滋靜養利益人蜂名寂寞無言八蓮成熟已墮泥復生如是展轉三世不絕名該通三際九從一蓮花轉生無量蓮花從一池花分開無數池花名重重無盡十三約教謂花從枝莖水土緣生作生滅觀者名小教一識蓮花從藕生作無性觀者名始教二知花從蓮實生作緣起觀者名終教三了花從蓮肉中卷荷心生作理實觀者名頓教四悟蓮花生長則蓮實根莖水土因緣莫不備具作圓融觀者名圓教五若約所詮法相喻者初小教中諦緣皮喻界內苦肉喻界內集泥喻界外集水喻界外苦芽鑽皮破喻界內滅芽鑽肉破喻界內道芽出泥上喻界外道芽出水面喻界外滅一皮肉泥草重覆於上喻無明緣有能生力喻行緣內含卷荷花果畢備喻識名色入觸受含潤喻愛取有團圓盤屈不能得出喻生老死芽鋒萌動鑽皮肉破喻無明滅不復還在皮肉內生喻行滅根莖花果出皮泥外喻識名色入觸受滅潤澤雨露喻愛取有滅出在水面開合自如喻生老死滅三次始教相宗執蓮花為實有遍計性也了達依他假有依他性也蓮實未隨緣已前及花落蓮墮已後本無花果生滅諸相圓成性也三空宗葉隨風雨飄灑花隨蜂蝶翔集我空也藕莖房子皆空無實法空也中空外實離有離無真空也四三終教蓮子本覺也五下泥池出泥水位當十信名名字覺處空欲敷十住鬚臺可識十行向日開迴十向名相似覺敷舒成就荷負蜂蝶十地鬚葉將落蓮房當獨等覺名隨分覺皆始覺也六花瓣謝盡臺子獨在究竟覺也七四頓教蓮子內有緣生性自覺智也蓮子內有不變性自覺境也八五圓教蓮房根莖事法界也九中間孔空理法界也二內空外有一如無礙理事無礙法界也三藕葉子鬚同時容遍事事無礙法界也四根子華葉利益人蜂施度也一香氣遍布無諸染污戒度也二生泥池不為辱忍度也三唯增長而無退進度也四靜住無為養成柔順禪度也五日出華開日暮華合慧度也六隨風水緣東昂西倒南涌北沒便度也七為蓮故花枝擎葉葢鬚遶房圍願度也八若藕若子皆有能生作用力度也九無量色光彼此相暎輝赫智度也十四顯宗我有無數種色蓮花名我法俱有一無數蓮花非我獨有名法有我無二唯現在見過未不知名法無去來三體相是真名影是妄名現通假實四花體相假子體相真名俗妄真實五花果皆屬有名無體名諸法但名六以上六門皆喻小乘隨相法執宗也若花若果皆從藕生此相不無名為唯識法相七此根此莖雖有外相實無內體名為真空無相八藕花依他蓮實法生蓮實隨諸緣起無礙名為藏心緣起九蓮實從內卷荷心生卷荷生性本無生滅名為真性寂滅十卷荷心性本唯一真離生離滅理實法界也卷荷心相根莖花果一一備具緣起法界也性亦容遍相亦容遍即今所生根葉花果亦皆容遍主伴重重名為圓融法界也十一五明觀花果未生前已滅後絕無其相即現在時念念遷謝空無自性名為真空絕相一雖無其性不妨有相非空非有而空而有名為理事無礙二根葉花果皆稱法界法界攝入重重無盡根等亦皆攝入無盡名為周遍含容三蓮子在泥池發芽鑽肉名地獄法界瞋知見如黛蓮一出皮名餓鬼法界貪知見如綠蓮二鑽泥名畜生法界癡知見如碧蓮三齊泥名脩羅法界慢知見如黃蓮四出泥在水名人法界戒知見如白蓮五處水增長名天法界定知見如紅蓮六齊水面名聲聞法界諦知見如紫蓮七出水面名辟支法界緣知見如赤蓮八處在空中名菩薩法界度知見如青蓮九纔出池初半分始也終至池面終也倏透池頂頓也直出池上圓滿將敷圓也向日開迴名佛法界覺知見如金蓮十花蘂初開小教花泛蓮現圓教下風則合空教上風則開相教日沒華合頓教宗通故日出花開終教說通故望天日上開人天歡樂一乘義也對池水下開魚鰕被蔭二乘義也不上不下迎風而開禽鳥往來蜂蝶採戲三乘義也以上名教義對一藕莖花鬚房實事也花鬚則外空房實則內空理也通名理事對二蓮實性無生滅境也卷荷心隨緣轉智也是境智對三芽根枝葉花果皆有生力行也植種發生增長成熟脫落五等階降位也是行位對四蓮花因也蓮實果也即因果對五蓮房依也蓮子正也蓮皮依也蓮肉正也蓮池依也蓮花正也即依正對六皆以四微八法為質體也而有生長開泛幹能用也即體用對七能隨日開合能隨風俯仰能擎雨翻珠能覆池現影皆人也所具白藕青枝紅花緣葉黃鬚紫瓣粉肉烏皮皆法也即人法對八好華影好珠好蓮實好藕皆順也不好花影不好珠不好蓮實不好藕皆逆也名逆順對九好不好花葉藕實珠影應也好不好風日雨水泥池感也如萎花隨烈日影臨濁水黃葉隨狂風珠灑暴雨沙藕移瘠池細子墮麤泥逆應感也鮮花隨皓日影臨淨水綠葉隨和風珠灑甘雨粉藕移肥池大子墮美泥順應感也名感應對十花鬚因蓮臺果同時具足名同時具足相應門一蘂狹花廣花廣果狹瓣廣鬚狹房廣子狹無礙自在名廣狹自在無礙門二蓮臺一鬚瓣多華瓣一蓮鬚多蓮房一子實多名一多相容不同門三臺在內鬚居中瓣繞外若云蓮花臺鬚即瓣若云蓮房鬚瓣即臺名諸法相即自在門四蘂時隱花時顯葉瓣顯鬚臺隱蓮房顯蓮子隱開時顯合時隱綻時顯謝時隱名祕密隱顯俱成門五一子帶多子入一房子子皆然一臺帶多子入多鬚一鬚帶一房多鬚入一葉鬚鬚皆然一葉帶多鬚葉入一蓮臺葉葉皆然一房帶多鬚瓣入多子等房房皆然如是相望重重無盡名因陀羅網境界門六花內含鬚臺臺內藏多子子內具諸根莖花果名微細相容安立門七見一葉一鬚一子即是見於多葉多鬚多子見一花即是見鬚臺見房空即是見子空名托事顯法生解門八自結蘂至果熟晝夜增長日月積累雖多時節不離當念名十世隔法異成門九荷花因蓮實果成三句一因主因伴隨一花葉為主餘多鬚葉為伴二果主果伴隨一子實為主餘多臺子為伴三果主因伴一蓮房為主餘多花瓣為伴彼此相望主伴重重名主伴圓明具德門十蓮花具含葉鬚臺實名總相一葉鬚臺實非即是花名別相二臺瓣鬚等同成一花名同相三蓮臺非鬚瓣等名異相四一花攬諸鬚瓣臺等緣成名成相五鬚瓣臺等各居自位名壞相六一花十玄六相既爾若望多花及餘根莖葉等十玄六相亦然蓮花喻爾餘喻例知法法時儀塵塵教觀可謂敷宗乘於六根之前布聲光於萬化之域後之覧者宜三復焉十時十儀十界十對十玄十度共六十四法界六相成七十三時三覺三觀十一宗共九十五教各開為五四諦因緣三性三空二自覺總合為五即成百法門也若以三覺中始覺三位及諦緣性空覺五門並悉開之便成一百二十重法喻也
